name: video_compress_v2
description: "A new Flutter video compress, support HDR convert to SDR"
version: 1.0.0+1
homepage:

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: 2.1.8
  lat_hdr_transcoder_v2: 1.0.0+5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.video_compress_v2.video_compress_v2
        pluginClass: VideoCompressV2Plugin
      ios:
        pluginClass: VideoCompressV2Plugin

